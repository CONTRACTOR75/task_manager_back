<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NÉCESSAIRE — To-Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13151d;
      --surface2: #1b1e2a;
      --border: rgba(255, 255, 255, 0.08);
      --border2: rgba(255, 255, 255, 0.14);
      --accent: #00e676;
      --accent-dim: rgba(0, 230, 118, 0.12);
      --danger: #ff4f4f;
      --warn: #ffc107;
      --orange: #ff8c42;
      --text: #ffffff;
      --text-sec: rgba(255, 255, 255, 0.65);
      --text-muted: rgba(255, 255, 255, 0.3);
      --grid: rgba(255, 255, 255, 0.03);
      --grid-size: 30px;
      --r: 6px;
      --font: 'Poppins', sans-serif;
      --sidebar-w: 250px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    button {
      cursor: pointer;
      border: none;
      background: none;
      font: inherit;
    }

    input,
    textarea,
    select {
      font: inherit;
      border: none;
      outline: none;
      background: none;
    }

    body {
      font-family: var(--font);
      color: var(--text);
      background-color: var(--bg);
      background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding: 28px 18px;
      flex-shrink: 0;
      box-shadow: 4px 0 40px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      font-weight: 900;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .logo-text {
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 4px;
      color: var(--text);
      opacity: 0.85;
    }

    .nav-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 6px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filters {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: var(--r);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-sec);
      transition: all 0.18s var(--ease);
      position: relative;
      width: 100%;
      text-align: left;
    }

    .filter-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .filter-btn.active {
      color: var(--text);
      background: var(--accent-dim);
    }

    .filter-btn.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      bottom: 20%;
      width: 3px;
      background: var(--accent);
      border-radius: 3px;
    }

    .btn-icon {
      font-size: 0.7rem;
      opacity: 0.6;
    }

    .badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text-muted);
      padding: 2px 7px;
      border-radius: 20px;
    }

    .filter-btn.active .badge {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .sidebar-stats {
      margin-top: auto;
    }

    .progress-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 20px;
      overflow: hidden;
      margin: 8px 0 7px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #00b8d4);
      border-radius: 20px;
      width: 0%;
      transition: width 0.5s var(--ease);
    }

    .progress-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* API CONFIG */
    .api-section {
      padding: 0 6px;
    }

    .api-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 5px 8px;
      margin-top: 5px;
    }

    .api-input-wrap input {
      flex: 1;
      font-size: 0.65rem;
      color: var(--text-sec);
      font-family: 'Poppins', sans-serif;
    }

    .api-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .api-dot.ok {
      background: var(--accent);
    }

    .api-dot.err {
      background: var(--danger);
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 36px;
      border-bottom: 1px solid var(--border);
      background: rgba(13, 15, 20, 0.6);
      backdrop-filter: blur(10px);
      gap: 16px;
      flex-wrap: wrap;
    }

    .view-title {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: var(--text);
    }

    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 8px 14px;
      transition: border-color 0.2s;
    }

    .search-wrap:focus-within {
      border-color: rgba(0, 230, 118, 0.4);
    }

    .search-icon {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .search-wrap input {
      width: 190px;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text);
    }

    .search-wrap input::placeholder {
      color: var(--text-muted);
    }

    .btn-new {
      padding: 9px 20px;
      background: var(--accent);
      color: #000;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-radius: var(--r);
      transition: all 0.18s var(--ease);
      white-space: nowrap;
    }

    .btn-new:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 230, 118, 0.3);
    }

    /* PRIORITY STRIP */
    .priority-strip {
      display: flex;
      gap: 8px;
      padding: 14px 36px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .priority-strip::-webkit-scrollbar {
      display: none;
    }

    .prio-chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: var(--text-sec);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .prio-chip:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .prio-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s var(--ease);
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: #0d2b1a;
      border: 1px solid rgba(0, 230, 118, 0.3);
      color: var(--accent);
    }

    .toast.error {
      background: #2b0d0d;
      border: 1px solid rgba(255, 79, 79, 0.3);
      color: var(--danger);
    }

    /* SPINNER */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* STATUS BADGE (Django statuses) */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .pill-pending {
      background: rgba(156, 163, 175, .15);
      color: #9ca3af;
    }

    .pill-in_progress {
      background: rgba(251, 191, 36, .15);
      color: #fbbf24;
    }

    .pill-done {
      background: rgba(74, 222, 128, .15);
      color: #4ade80;
    }

    .pill-overdue {
      background: rgba(248, 113, 113, .15);
      color: #f87171;
    }

    /* TASK BOARD */
    .task-board {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-board::-webkit-scrollbar {
      width: 5px;
    }

    .task-board::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 0;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-state.visible {
      display: flex;
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 10px;
      animation: pulse 3s ease-in-out infinite;
    }

    .empty-state p {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-sec);
    }

    .empty-sub {
      font-size: 0.8rem !important;
      color: var(--text-muted) !important;
      font-weight: 400 !important;
    }

    .empty-sub kbd {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.75rem;
      font-family: var(--font);
      color: var(--text-sec);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .2;
      }

      50% {
        opacity: .5;
      }
    }

    /* TASK CARD */
    .task-card {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: start;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s var(--ease) both;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-card::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .task-card:hover::after {
      opacity: 1;
    }

    .task-card.done {
      opacity: 0.4;
    }

    .task-card.done .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-check {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s var(--ease);
      cursor: pointer;
    }

    .task-check:hover {
      border-color: var(--accent);
    }

    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check.checked::after {
      content: '✓';
      font-size: 0.7rem;
      font-weight: 700;
      color: #000;
    }

    .task-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .task-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-desc {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-sec);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-due {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .task-due.overdue {
      color: var(--danger);
    }

    .task-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    .prio-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      margin-top: 3px;
    }

    .prio-1 {
      background: #4caf50;
    }

    .prio-2 {
      background: #ffc107;
    }

    .prio-3 {
      background: #ff4f4f;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-card:hover .task-actions {
      opacity: 1;
    }

    .task-action-btn {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .task-action-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .task-action-btn.del:hover {
      color: var(--danger);
    }

    /* MODALS */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 6, 10, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
      transform: translateY(16px) scale(0.97);
      transition: transform 0.25s var(--ease);
      background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal--sm {
      max-width: 400px;
    }

    .modal--detail {
      max-width: 500px;
    }

    .modal::-webkit-scrollbar {
      width: 4px;
    }

    .modal::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .modal-close {
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: color 0.15s;
      padding: 4px;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal-footer {
      padding: 18px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    .req {
      color: var(--accent);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field input[type="text"],
    .field input[type="datetime-local"],
    .field textarea,
    .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 14px;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text);
      transition: border-color 0.2s;
      width: 100%;
    }

    .field textarea {
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(0, 230, 118, 0.45);
    }

    .field input.error {
      border-color: var(--danger) !important;
    }

    .field select {
      appearance: none;
      cursor: pointer;
    }

    .field select option {
      background: #1b1e2a;
      color: #fff;
    }

    .field input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
    }

    .field-error {
      font-size: 0.7rem;
      color: var(--danger);
      min-height: 14px;
    }

    .btn-primary {
      padding: 9px 22px;
      background: var(--accent);
      color: #000;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: var(--r);
      transition: all 0.18s var(--ease);
    }

    .btn-primary:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 230, 118, 0.25);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-ghost {
      padding: 9px 18px;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-sec);
      transition: all 0.15s;
    }

    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.25);
      color: var(--text);
    }

    .btn-danger {
      color: var(--danger) !important;
      border-color: rgba(255, 79, 79, 0.3) !important;
    }

    .btn-danger:hover {
      background: rgba(255, 79, 79, 0.08) !important;
    }

    .detail-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .detail-desc {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-sec);
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .detail-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .detail-chip {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text-sec);
    }

    .detail-meta {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .detail-meta-row {
      display: flex;
      gap: 10px;
      font-size: 0.72rem;
    }

    .detail-meta-row .dmr-key {
      width: 100px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .detail-meta-row .dmr-val {
      font-weight: 400;
      color: var(--text-sec);
    }

    .detail-meta-row .dmr-val.overdue {
      color: var(--danger);
    }

    @media(max-width:750px) {
      .sidebar {
        display: none;
      }

      .top-bar {
        padding: 14px 18px;
      }

      .task-board {
        padding: 16px 18px;
      }

      .priority-strip {
        padding: 10px 18px;
      }

      .view-title {
        font-size: 1.3rem;
      }

      .field-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-mark">N/</span>
      <span class="logo-text">NÉCESSAIRE</span>
    </div>

    <nav class="filters">
      <p class="nav-label">AFFICHAGE</p>
      <button class="filter-btn active" data-filter="all">
        <span class="btn-icon">◈</span> Toutes <span class="badge" id="badge-all">0</span>
      </button>
      <button class="filter-btn" data-filter="in_progress">
        <span class="btn-icon">◉</span> En cours <span class="badge" id="badge-in_progress">0</span>
      </button>
      <button class="filter-btn" data-filter="done">
        <span class="btn-icon">◎</span> Terminées <span class="badge" id="badge-done">0</span>
      </button>
      <button class="filter-btn" data-filter="overdue">
        <span class="btn-icon">⚠</span> Dépassées <span class="badge" id="badge-overdue">0</span>
      </button>
    </nav>

    <div class="sidebar-stats">
      <p class="nav-label">PROGRESSION</p>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-label" id="progressLabel">0 / 0 tâches</p>
    </div>

    <!-- API CONFIG -->
    <div class="api-section">
      <p class="nav-label">API <span id="apiDot" class="api-dot"></span></p>
      <div class="api-input-wrap">
        <input type="text" id="apiBase" value="http://localhost:8000/api" placeholder="http://localhost:8000/api" />
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="top-bar">
      <div class="view-title" id="viewTitle">Toutes les tâches</div>
      <div class="top-bar-actions">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" placeholder="Rechercher…" />
        </div>
        <button class="btn-new" id="openTaskModal">+ Nouvelle tâche</button>
      </div>
    </header>

    <div class="priority-strip">
      <button class="prio-chip active" data-prio="all">Tout</button>
      <button class="prio-chip" data-prio="3">🟢 Basse </button>
      <button class="prio-chip" data-prio="2">🟡 Moyenne</button>
      <button class="prio-chip" data-prio="1">🔴 Haute</button>
    </div>

    <div class="task-board" id="taskBoard">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✦</div>
        <p>Aucune tâche pour l'instant.</p>
        <p class="empty-sub">Appuyez sur <kbd>N</kbd> ou cliquez sur « + Nouvelle tâche ».</p>
      </div>
    </div>
  </main>

  <!-- MODAL TÂCHE -->
  <div class="modal-overlay" id="taskModalOverlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">NOUVELLE TÂCHE</span>
        <button class="modal-close" id="closeTaskModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>TITRE <span class="req">*</span></label>
          <input type="text" id="taskTitle" placeholder="Nom de la tâche…" autocomplete="off" />
          <span class="field-error" id="titleError"></span>
        </div>
        <div class="field">
          <label>DESCRIPTION</label>
          <textarea id="taskDesc" placeholder="Détails, notes, contexte…" rows="3"></textarea>
        </div>
        <div class="field-row">
          <div class="field">
            <label>STATUT</label>
            <select id="taskStatus">
              <option value="pending">⚪ À débuter</option>
              <option value="in_progress">🟡 En cours</option>
              <option value="done">🟢 Terminée</option>
              <option value="overdue">🔴 Dépassée</option>
            </select>
          </div>
          <div class="field">
            <label>PRIORITÉ</label>
            <select id="taskPriority">
              <option value="3">🔴 Haute</option>
              <option value="2" selected>🟡 Moyenne</option>
              <option value="1">🟢 Basse</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>ÉCHÉANCE</label>
          <input type="datetime-local" id="taskDue" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="cancelTaskModal">Annuler</button>
        <button class="btn-primary" id="saveTask">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- MODAL DÉTAIL -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal modal--detail">
      <div class="modal-header">
        <span class="modal-title">DÉTAIL DE LA TÂCHE</span>
        <button class="modal-close" id="closeDetail">✕</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn-ghost btn-danger" id="detailDelete">Supprimer</button>
        <button class="btn-primary" id="detailEdit">Modifier</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════════════════════════
    //  NÉCESSAIRE × Django REST API
    // ══════════════════════════════════════════════════════════

    const S = {
      tasks: [], allTasks: [], filter: 'all', prioFilter: 'all',
      search: '', editingId: null, detailId: null,
    };

    // ── API ───────────────────────────────────────────────────
    function apiBase() { return document.getElementById('apiBase').value.replace(/\/$/, ''); }

    async function api(method, path, body = null) {
      const opts = {
        method,
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(apiBase() + path, opts);
      if (res.status === 204) return null;
      const data = await res.json();
      if (!res.ok) throw data;
      return data;
    }

    // ── TOAST ─────────────────────────────────────────────────
    let toastTimer;
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── API STATUS DOT ────────────────────────────────────────
    async function checkApi() {
      const dot = document.getElementById('apiDot');
      try {
        await fetch(apiBase() + '/dashboard/stats/');
        dot.className = 'api-dot ok';
      } catch {
        dot.className = 'api-dot err';
      }
    }

    // ── FETCH ALL TASKS ───────────────────────────────────────
async function fetchTasks() {
  try {
    // Toujours fetch TOUT, on filtre côté client
    const data = await api('GET', '/tasks/?page_size=200');
    S.allTasks = data.results ?? data;   // garde une copie complète
    S.tasks = S.filter === 'all'
      ? S.allTasks
      : S.allTasks.filter(t => t.status === S.filter);
    render();
  } catch (e) {
    toast('Impossible de charger les tâches. Vérifie la base URL.', 'error');
  }
}

    // ── UTILS ─────────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fmtDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function isOverdue(task) {
      return task.status === 'overdue' || (task.due_date && new Date(task.due_date) < new Date() && task.status !== 'done');
    }
    const STATUS_META = {
      pending: { label: 'À débuter', cls: 'pill-pending', dot: '⚪' },
      in_progress: { label: 'En cours', cls: 'pill-in_progress', dot: '🟡' },
      done: { label: 'Terminée', cls: 'pill-done', dot: '🟢' },
      overdue: { label: 'Dépassée', cls: 'pill-overdue', dot: '🔴' },
    };
    const PRIO_META = { 1: '🟢 Basse', 2: '🟡 Moyenne', 3: '🔴 Haute' };

    function getFiltered() {
      let t = [...S.tasks];
      if (S.prioFilter !== 'all') t = t.filter(x => String(x.priority) === String(S.prioFilter));
      if (S.search.trim()) {
        const q = S.search.toLowerCase();
        t = t.filter(x => x.title.toLowerCase().includes(q) || (x.description || '').toLowerCase().includes(q));
      }
      return t;
    }

    // ── RENDER SIDEBAR ────────────────────────────────────────
    function renderSidebar() {
      const total = S.tasks.length;
      const done = S.tasks.filter(t => t.status === 'done').length;
      ['all', 'in_progress', 'done', 'overdue'].forEach(k => {
        const el = document.getElementById('badge-' + k);
        if (!el) return;
        el.textContent = k === 'all' ? total : S.tasks.filter(t => t.status === k).length;
      });
      const pct = total ? Math.round(done / total * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${done} / ${total} tâches`;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === S.filter)
      );
      const titles = { all: 'Toutes les tâches', in_progress: 'En cours', done: 'Terminées', overdue: 'Dépassées' };
      document.getElementById('viewTitle').textContent = titles[S.filter] || 'Tâches';
    }

    // ── RENDER BOARD ──────────────────────────────────────────
    function renderBoard() {
      const board = document.getElementById('taskBoard');
      const empty = document.getElementById('emptyState');
      const tasks = getFiltered();
      [...board.children].forEach(c => { if (c !== empty) c.remove(); });
      if (!tasks.length) { empty.classList.add('visible'); return; }
      empty.classList.remove('visible');

      tasks.forEach((task, i) => {
        const sm = STATUS_META[task.status] || STATUS_META.pending;
        const card = document.createElement('div');
        card.className = 'task-card' + (task.status === 'done' ? ' done' : '');
        card.style.animationDelay = (i * 0.04) + 's';
        card.dataset.id = task.id;
        card.innerHTML = `
      <div class="task-check${task.status === 'done' ? ' checked' : ''}" data-id="${task.id}"></div>
      <div class="task-body">
        <div class="task-title">${esc(task.title)}</div>
        ${task.description ? `<div class="task-desc">${esc(task.description)}</div>` : ''}
        <div class="task-meta">
          <span class="status-pill ${sm.cls}">${sm.dot} ${sm.label}</span>
          ${task.due_date ? `<span class="task-due${isOverdue(task) ? 'overdue' : ''}">${isOverdue(task) ? '⚠ ' : ''}${fmtDate(task.due_date)}</span>` : ''}
        </div>
      </div>
      <div class="task-right">
        <div class="prio-dot prio-${task.priority}" title="${PRIO_META[task.priority] || ''}"></div>
        <div class="task-actions">
          <button class="task-action-btn edit-btn" data-id="${task.id}" title="Modifier">✎</button>
          <button class="task-action-btn del del-btn"  data-id="${task.id}" title="Supprimer">✕</button>
        </div>
      </div>
    `;
        card.addEventListener('click', e => {
          if (e.target.closest('.task-check,.edit-btn,.del-btn')) return;
          openDetail(task.id);
        });
        board.appendChild(card);
      });

      board.querySelectorAll('.task-check').forEach(el =>
        el.addEventListener('click', ev => { ev.stopPropagation(); toggleDone(el.dataset.id); })
      );
      board.querySelectorAll('.edit-btn').forEach(el =>
        el.addEventListener('click', ev => { ev.stopPropagation(); openTaskModal(el.dataset.id); })
      );
      board.querySelectorAll('.del-btn').forEach(el =>
        el.addEventListener('click', ev => { ev.stopPropagation(); deleteTask(el.dataset.id); })
      );
    }

    function render() { renderSidebar(); renderBoard(); }

    // ── ACTIONS ───────────────────────────────────────────────
    async function toggleDone(id) {
      const task = S.tasks.find(t => t.id == id);
      if (!task) return;
      const newStatus = task.status === 'done' ? 'pending' : 'done';
      try {
        const updated = await api('PATCH', `/tasks/${id}/`, { status: newStatus });
        Object.assign(task, updated);
        render();
        toast(newStatus === 'done' ? '✓ Tâche terminée !' : 'Tâche réouverte');
      } catch { toast('Erreur lors de la mise à jour.', 'error'); }
    }

    async function deleteTask(id) {
      if (!confirm('Supprimer cette tâche ?')) return;
      try {
        await api('DELETE', `/tasks/${id}/`);
        S.tasks = S.tasks.filter(t => t.id != id);
        if (S.detailId == id) closeDetail();
        render();
        toast('Tâche supprimée.');
      } catch { toast('Erreur lors de la suppression.', 'error'); }
    }

    // ── MODAL TÂCHE ───────────────────────────────────────────
    function openTaskModal(id = null) {
      S.editingId = id;
      const task = id ? S.tasks.find(t => t.id == id) : null;
      document.getElementById('modalTitle').textContent = id ? 'MODIFIER LA TÂCHE' : 'NOUVELLE TÂCHE';
      document.getElementById('taskTitle').value = task?.title || '';
      document.getElementById('taskDesc').value = task?.description || '';
      document.getElementById('taskStatus').value = task?.status || 'pending';
      document.getElementById('taskPriority').value = String(task?.priority ?? 2);
      document.getElementById('titleError').textContent = '';
      document.getElementById('taskTitle').classList.remove('error');
      if (task?.due_date) {
        // Convert to datetime-local format
        const d = new Date(task.due_date);
        document.getElementById('taskDue').value = d.toISOString().slice(0, 16);
      } else {
        document.getElementById('taskDue').value = '';
      }
      openOverlay('taskModalOverlay');
      setTimeout(() => document.getElementById('taskTitle').focus(), 60);
    }
    function closeTaskModal() { closeOverlay('taskModalOverlay'); S.editingId = null; }

    async function saveTask() {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) {
        document.getElementById('taskTitle').classList.add('error');
        document.getElementById('titleError').textContent = 'Le titre est obligatoire.';
        document.getElementById('taskTitle').focus();
        return;
      }
      const dueRaw = document.getElementById('taskDue').value;
      const body = {
        title,
        description: document.getElementById('taskDesc').value.trim(),
        status: document.getElementById('taskStatus').value,
        priority: parseInt(document.getElementById('taskPriority').value),
        due_date: dueRaw ? new Date(dueRaw).toISOString() : null,
      };
      const btn = document.getElementById('saveTask');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Enregistrement…';
      try {
        if (S.editingId) {
          const updated = await api('PATCH', `/tasks/${S.editingId}/`, body);
          const idx = S.tasks.findIndex(t => t.id == S.editingId);
          if (idx !== -1) S.tasks[idx] = updated;
          toast('Tâche mise à jour !');
        } else {
          const created = await api('POST', '/tasks/', body);
          S.tasks.unshift(created);
          toast('Tâche créée !');
        }
        closeTaskModal();
        render();
      } catch (err) {
        const msg = typeof err === 'object' ? Object.values(err).flat().join(' ') : 'Erreur API.';
        toast(msg, 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Enregistrer';
    }

    // ── MODAL DÉTAIL ──────────────────────────────────────────
    function openDetail(id) {
      const task = S.tasks.find(t => t.id == id);
      if (!task) return;
      S.detailId = id;
      const sm = STATUS_META[task.status] || STATUS_META.pending;
      const overdue = isOverdue(task);
      document.getElementById('detailBody').innerHTML = `
    <div class="detail-title">${esc(task.title)}</div>
    ${task.description
          ? `<div class="detail-desc">${esc(task.description)}</div>`
          : `<div class="detail-desc" style="opacity:.35;font-style:italic">Aucune description.</div>`}
    <div class="detail-chips">
      <span class="detail-chip"><span class="status-pill ${sm.cls}">${sm.dot} ${sm.label}</span></span>
      <span class="detail-chip">${PRIO_META[task.priority] || '—'}</span>
    </div>
    <div class="detail-meta">
      ${task.created_at ? `<div class="detail-meta-row"><span class="dmr-key">CRÉÉE LE</span><span class="dmr-val">${new Date(task.created_at).toLocaleString('fr-FR')}</span></div>` : ''}
      ${task.due_date ? `<div class="detail-meta-row"><span class="dmr-key">ÉCHÉANCE</span><span class="dmr-val${overdue ? ' overdue' : ''}">${overdue ? '⚠ ' : ''}${fmtDate(task.due_date)}</span></div>` : ''}
      ${task.updated_at ? `<div class="detail-meta-row"><span class="dmr-key">MODIFIÉE LE</span><span class="dmr-val">${new Date(task.updated_at).toLocaleString('fr-FR')}</span></div>` : ''}
    </div>
  `;
      openOverlay('detailOverlay');
    }
    function closeDetail() { closeOverlay('detailOverlay'); S.detailId = null; }

    // ── OVERLAY HELPERS ───────────────────────────────────────
    function openOverlay(id) { document.getElementById(id).classList.add('open'); }
    function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

    // ── WIRING ────────────────────────────────────────────────
    document.getElementById('openTaskModal').addEventListener('click', () => openTaskModal());
    document.getElementById('saveTask').addEventListener('click', saveTask);
    document.getElementById('cancelTaskModal').addEventListener('click', closeTaskModal);
    document.getElementById('closeTaskModal').addEventListener('click', closeTaskModal);
    document.getElementById('taskTitle').addEventListener('input', function () {
      this.classList.remove('error');
      document.getElementById('titleError').textContent = '';
    });
    document.getElementById('taskTitle').addEventListener('keydown', e => { if (e.key === 'Enter') saveTask(); });

    document.getElementById('closeDetail').addEventListener('click', closeDetail);
    document.getElementById('detailEdit').addEventListener('click', () => { const id = S.detailId; closeDetail(); openTaskModal(id); });
    document.getElementById('detailDelete').addEventListener('click', () => { if (S.detailId) deleteTask(S.detailId); });

    ['taskModalOverlay', 'detailOverlay'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target.id === id) { closeTaskModal(); closeDetail(); }
      });
    });

    document.querySelectorAll('.filter-btn').forEach(b =>
      b.addEventListener('click', () => {
        S.filter = b.dataset.filter;
        fetchTasks();
      })
    );

    document.querySelectorAll('.prio-chip').forEach(b =>
      b.addEventListener('click', () => {
        document.querySelectorAll('.prio-chip').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        S.prioFilter = b.dataset.prio;
        render();
      })
    );

    document.getElementById('searchInput').addEventListener('input', e => {
      S.search = e.target.value; render();
    });

    // Reload on base URL change
    let apiTimer;
    document.getElementById('apiBase').addEventListener('input', () => {
      clearTimeout(apiTimer);
      apiTimer = setTimeout(() => { checkApi(); fetchTasks(); }, 600);
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeTaskModal(); closeDetail(); return; }
      const tag = document.activeElement.tagName;
      if ((e.key === 'n' || e.key === 'N') && !e.ctrlKey && !e.metaKey && tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT')
        openTaskModal();
    });

    // ── INIT ──────────────────────────────────────────────────
    checkApi();
    fetchTasks();
  </script>
</body>

</html>
