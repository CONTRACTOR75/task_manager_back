<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task API Tester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --get: #4ade80;
    --post: #60a5fa;
    --patch: #fb923c;
    --delete: #f87171;
    --accent: #a78bfa;
    --pending: #9ca3af;
    --in_progress: #fbbf24;
    --done: #4ade80;
    --overdue: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; min-height: 100vh; }

  /* LAYOUT */
  .app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; overflow: hidden; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .main { display: flex; flex-direction: column; overflow: hidden; }

  /* SIDEBAR */
  .sidebar-header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
  .sidebar-header p { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .sidebar-section { padding: 12px 8px 4px; }
  .sidebar-section-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 8px 8px; }

  .endpoint-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 10px; border: none;
    background: transparent; color: var(--text); cursor: pointer;
    border-radius: 6px; text-align: left; transition: background 0.15s;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
  }
  .endpoint-btn:hover { background: var(--surface2); }
  .endpoint-btn.active { background: var(--surface2); }
  .endpoint-btn .badge {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px; min-width: 44px; text-align: center;
  }
  .badge-GET    { background: rgba(74,222,128,.15); color: var(--get); }
  .badge-POST   { background: rgba(96,165,250,.15); color: var(--post); }
  .badge-PATCH  { background: rgba(251,146,60,.15);  color: var(--patch); }
  .badge-DELETE { background: rgba(248,113,113,.15); color: var(--delete); }

  .endpoint-url { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* BASE URL BAR */
  .base-bar { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .base-bar label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .base-bar input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 5px 10px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; }
  .base-bar input:focus { border-color: var(--accent); }

  /* REQUEST PANEL */
  .request-panel { flex: 1; overflow-y: auto; padding: 20px; }
  .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
  .panel-desc { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  .request-url-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .method-tag { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 6px; white-space: nowrap; }
  .url-display { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }

  .field-group { margin-bottom: 14px; }
  .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .field-row { display: flex; gap: 8px; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 80px; }

  .send-btn {
    padding: 9px 20px; border: none; border-radius: 6px;
    background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RESPONSE PANEL */
  .response-panel { border-top: 1px solid var(--border); background: var(--surface); padding: 0; display: flex; flex-direction: column; max-height: 340px; }
  .response-header { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
  .response-header span { font-size: 12px; color: var(--muted); }
  .status-badge { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 4px; }
  .status-2xx { background: rgba(74,222,128,.15); color: var(--get); }
  .status-4xx { background: rgba(248,113,113,.15); color: var(--delete); }
  .status-5xx { background: rgba(248,113,113,.15); color: var(--delete); }
  .response-time { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }
  .response-body { flex: 1; overflow-y: auto; padding: 14px 20px; }
  pre { font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; color: var(--text); }

  /* JSON colors */
  .json-key    { color: #93c5fd; }
  .json-string { color: #86efac; }
  .json-number { color: #fca5a5; }
  .json-bool   { color: var(--patch); }
  .json-null   { color: var(--muted); }

  /* STATUS PILLS */
  .status-pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
  }
  .pill-pending     { background: rgba(156,163,175,.15); color: var(--pending); }
  .pill-in_progress { background: rgba(251,191,36,.15);  color: var(--in_progress); }
  .pill-done        { background: rgba(74,222,128,.15);  color: var(--done); }
  .pill-overdue     { background: rgba(248,113,113,.15); color: var(--overdue); }

  /* PLACEHOLDER */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--muted); }
  .empty-state .icon { font-size: 32px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .divider { height: 1px; background: var(--border); margin: 8px 8px; }

  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  
  .loading { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Task Manager</h1>
      <p>API Tester — v1.0</p>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Tâches</div>
      <button class="endpoint-btn" onclick="selectEndpoint('list')">
        <span class="badge badge-GET">GET</span>
        <span class="endpoint-url">/tasks/</span>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('create')">
        <span class="badge badge-POST">POST</span>
        <span class="endpoint-url">/tasks/</span>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('detail')">
        <span class="badge badge-GET">GET</span>
        <span class="endpoint-url">/tasks/&lt;id&gt;/</span>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('update')">
        <span class="badge badge-PATCH">PATCH</span>
        <span class="endpoint-url">/tasks/&lt;id&gt;/</span>
      </button>
      <button class="endpoint-btn" onclick="selectEndpoint('delete')">
        <span class="badge badge-DELETE">DELETE</span>
        <span class="endpoint-url">/tasks/&lt;id&gt;/</span>
      </button>
    </div>

    <div class="divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Dashboard</div>
      <button class="endpoint-btn" onclick="selectEndpoint('stats')">
        <span class="badge badge-GET">GET</span>
        <span class="endpoint-url">/dashboard/stats/</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- BASE URL -->
    <div class="base-bar">
      <label>Base URL</label>
      <input type="text" id="baseUrl" value="http://localhost:8000/api" placeholder="http://localhost:8000/api"/>
    </div>

    <!-- REQUEST -->
    <div class="request-panel" id="requestPanel">
      <div class="empty-state">
        <div class="icon">⚡</div>
        <p>Sélectionne un endpoint dans la sidebar</p>
      </div>
    </div>

    <!-- RESPONSE -->
    <div class="response-panel" id="responsePanel" style="display:none">
      <div class="response-header">
        <span>Réponse</span>
        <span id="statusBadge" class="status-badge"></span>
        <span id="responseTime" class="response-time"></span>
      </div>
      <div class="response-body">
        <pre id="responseBody"></pre>
      </div>
    </div>
  </div>
</div>

<script>
const ENDPOINTS = {
  list: {
    method: 'GET', path: '/tasks/', label: 'Liste des tâches',
    desc: 'Retourne toutes les tâches, triées par priorité et date d\'échéance.',
    fields: [
      { key: 'status', label: 'Filtre statut (optionnel)', type: 'select', options: ['', 'pending', 'in_progress', 'done', 'overdue'], queryParam: true },
      { key: 'page',   label: 'Page (optionnel)',          type: 'number', queryParam: true },
    ]
  },
  create: {
    method: 'POST', path: '/tasks/', label: 'Créer une tâche',
    desc: 'Crée une nouvelle tâche. Le champ title est obligatoire.',
    fields: [
      { key: 'title',       label: 'Titre *',    type: 'text',   required: true },
      { key: 'description', label: 'Description', type: 'textarea' },
      { key: 'priority',    label: 'Priorité',    type: 'select', options: ['', '1', '2', '3'], optionLabels: ['—', '1 — Basse', '2 — Moyenne', '3 — Haute'] },
      { key: 'due_date',    label: 'Échéance (ISO 8601)', type: 'text', placeholder: '2025-12-31T23:59:00Z' },
    ]
  },
  detail: {
    method: 'GET', path: '/tasks/{id}/', label: 'Détail d\'une tâche',
    desc: 'Retourne toutes les informations d\'une tâche par son ID.',
    fields: [
      { key: 'id', label: 'ID de la tâche *', type: 'number', pathParam: true, required: true },
    ]
  },
  update: {
    method: 'PATCH', path: '/tasks/{id}/', label: 'Modifier une tâche',
    desc: 'Mise à jour partielle — envoie uniquement les champs à modifier.',
    fields: [
      { key: 'id',     label: 'ID de la tâche *', type: 'number', pathParam: true, required: true },
      { key: 'title',  label: 'Nouveau titre',     type: 'text' },
      { key: 'status', label: 'Nouveau statut',    type: 'select', options: ['', 'pending', 'in_progress', 'done', 'overdue'] },
      { key: 'priority', label: 'Priorité',        type: 'select', options: ['', '1', '2', '3'], optionLabels: ['—', '1 — Basse', '2 — Moyenne', '3 — Haute'] },
      { key: 'due_date', label: 'Nouvelle échéance', type: 'text', placeholder: '2025-12-31T23:59:00Z' },
    ]
  },
  delete: {
    method: 'DELETE', path: '/tasks/{id}/', label: 'Supprimer une tâche',
    desc: 'Supprime définitivement une tâche. Action irréversible.',
    fields: [
      { key: 'id', label: 'ID de la tâche *', type: 'number', pathParam: true, required: true },
    ]
  },
  stats: {
    method: 'GET', path: '/dashboard/stats/', label: 'Statistiques dashboard',
    desc: 'Retourne le comptage des tâches par statut.',
    fields: []
  },
};

const METHOD_COLOR = { GET: 'var(--get)', POST: 'var(--post)', PATCH: 'var(--patch)', DELETE: 'var(--delete)' };
const METHOD_BG    = { GET: 'rgba(74,222,128,.12)', POST: 'rgba(96,165,250,.12)', PATCH: 'rgba(251,146,60,.12)', DELETE: 'rgba(248,113,113,.12)' };

let currentEndpoint = null;

function selectEndpoint(key) {
  currentEndpoint = key;
  document.querySelectorAll('.endpoint-btn').forEach((b, i) => {
    const keys = ['list','create','detail','update','delete','stats'];
    b.classList.toggle('active', keys[i] === key);
  });

  const ep = ENDPOINTS[key];
  const panel = document.getElementById('requestPanel');

  let html = `
    <div class="panel-title">
      <span class="method-tag" style="background:${METHOD_BG[ep.method]};color:${METHOD_COLOR[ep.method]}">${ep.method}</span>
      ${ep.label}
    </div>
    <div class="panel-desc">${ep.desc}</div>
    <div class="request-url-bar">
      <span class="url-display" id="urlPreview">—</span>
    </div>
  `;

  if (ep.fields.length > 0) {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">`;
    ep.fields.forEach(f => {
      const isWide = f.type === 'textarea' || f.key === 'description';
      html += `<div class="field-group" style="${isWide ? 'grid-column:span 2' : ''}">`;
      html += `<div class="field-label">${f.label}</div>`;
      if (f.type === 'select') {
        const opts = f.options.map((o, i) => `<option value="${o}">${f.optionLabels ? f.optionLabels[i] : (o || '— aucun —')}</option>`).join('');
        html += `<select id="field_${f.key}" onchange="updateUrlPreview()">${opts}</select>`;
      } else if (f.type === 'textarea') {
        html += `<textarea id="field_${f.key}" placeholder="${f.placeholder || ''}" oninput="updateUrlPreview()"></textarea>`;
      } else {
        html += `<input type="${f.type}" id="field_${f.key}" placeholder="${f.placeholder || ''}" oninput="updateUrlPreview()"/>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `<button class="send-btn" id="sendBtn" onclick="sendRequest()">Envoyer la requête →</button>`;
  panel.innerHTML = html;

  document.getElementById('responsePanel').style.display = 'none';
  updateUrlPreview();
}

function getFieldValue(key) {
  const el = document.getElementById('field_' + key);
  return el ? el.value.trim() : '';
}

function buildUrl() {
  const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
  const ep = ENDPOINTS[currentEndpoint];
  if (!ep) return base;
  let path = ep.path;
  const queryParams = [];

  ep.fields.forEach(f => {
    const val = getFieldValue(f.key);
    if (f.pathParam && val) path = path.replace('{id}', val);
    else if (f.pathParam)   path = path.replace('{id}', '<id>');
    else if (f.queryParam && val) queryParams.push(`${f.key}=${encodeURIComponent(val)}`);
  });

  return base + path + (queryParams.length ? '?' + queryParams.join('&') : '');
}

function updateUrlPreview() {
  const el = document.getElementById('urlPreview');
  if (el) el.textContent = buildUrl();
}

async function sendRequest() {
  if (!currentEndpoint) return;
  const ep = ENDPOINTS[currentEndpoint];
  const url = buildUrl();
  const btn = document.getElementById('sendBtn');

  // Validate
  for (const f of ep.fields) {
    if (f.required && !getFieldValue(f.key)) {
      alert(`Le champ "${f.label}" est obligatoire.`); return;
    }
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Envoi...';
  document.getElementById('responsePanel').style.display = 'none';

  const opts = { method: ep.method, headers: { 'Content-Type': 'application/json' } };
  const bodyFields = ep.fields.filter(f => !f.pathParam && !f.queryParam);
  if (['POST', 'PATCH'].includes(ep.method) && bodyFields.length) {
    const body = {};
    bodyFields.forEach(f => { const v = getFieldValue(f.key); if (v) body[f.key] = f.type === 'number' ? Number(v) : v; });
    opts.body = JSON.stringify(body);
  }

  const t0 = Date.now();
  try {
    const res = await fetch(url, opts);
    const elapsed = Date.now() - t0;
    let data = null;
    const text = await res.text();
    try { data = JSON.parse(text); } catch { data = text; }

    showResponse(res.status, data, elapsed);
  } catch (err) {
    showResponse(0, { error: 'Impossible de joindre le serveur.', detail: err.message }, Date.now() - t0);
  }

  btn.disabled = false;
  btn.textContent = 'Envoyer la requête →';
}

function showResponse(status, data, elapsed) {
  const panel = document.getElementById('responsePanel');
  panel.style.display = 'flex';

  const badge = document.getElementById('statusBadge');
  const statusText = status === 0 ? 'ERR' : status;
  badge.textContent = statusText;
  badge.className = 'status-badge ' + (status >= 500 ? 'status-5xx' : status >= 400 ? 'status-4xx' : 'status-2xx');

  document.getElementById('responseTime').textContent = elapsed + ' ms';
  document.getElementById('responseBody').innerHTML = status === 204
    ? '<span style="color:var(--muted)">204 No Content — Tâche supprimée avec succès.</span>'
    : syntaxHighlight(typeof data === 'string' ? data : JSON.stringify(data, null, 2));
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[\dA-Fa-f]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    if (/^"/.test(match)) return /:$/.test(match) ? `<span class="json-key">${match}</span>` : `<span class="json-string">${match}</span>`;
    if (/true|false/.test(match)) return `<span class="json-bool">${match}</span>`;
    if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
    return `<span class="json-number">${match}</span>`;
  });
}
</script>
</body>
</html>
